<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: flex;
  gap: 20px; /* space between boxes */
}

.textbox {
  flex: 1;              /* makes both boxes equal width */
  height: 200px;        /* makes them big */
  width: 100px;
  padding: 10px;
  font-size: 18px;
}

.resultsWrapper {
  display: flex;             /* Makes children appear side by side */
  gap: 20px;                 /* Space between the two columns */
  align-items: flex-start;   /* Aligns top edges */
}

.resultContainer {
  flex: 1;                   /* Each div takes equal width */
  border: 1px solid #ccc;    /* Optional: for visual separation */
  padding: 10px;
  max-width: 400px;          /* Optional: limit width */
  overflow-wrap: break-word; /* Prevent text overflow */
}
</style>
</head>
<title>title</title>
<body>

<div class="container">
  <textarea class="textbox" id="oldDeck"></textarea>
  <textarea class="textbox" id="newDeck"></textarea>
</div>
<div class="buttonContainer">
    <button id="submitbtn">Find changes</button>
</div>

<div class="resultsWrapper">
  <div class="resultContainer" id="removeCardsContainer">
    <!-- Cards to remove will go here -->
  </div>
  <div class="resultContainer" id="addCardsContainer">
    <!-- Cards to add will go here -->
  </div>
</div>

</div>
<script src="app.js"></script>
</body>
</html>
